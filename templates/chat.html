<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>

  <body
    class="bg-gradient-to-br from-slate-900 to-slate-800 h-screen flex items-center justify-center"
  >
    <div
      class="w-full max-w-2xl h-[90vh] bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl flex flex-col overflow-hidden"
    >
      <!-- Header -->
      <div class="p-4 border-b border-white/20 flex items-center gap-3">
        <img
          src="https://png.pngtree.com/png-vector/20231213/ourmid/pngtree-ai-machine-learning-artificial-intelligence-anthropomorphic-image-4-png-image_11330344.png"
          class="w-10 h-10 rounded-full"
        />
        <div>
          <h1 class="text-white font-semibold">ML & DL Chatbot</h1>
          <p class="text-sm text-gray-300">Chat like ChatGPT 🚀</p>
        </div>
      </div>

      <!-- Chat -->
      <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-4"></div>

      <!-- Input -->
      <form id="chatForm" class="p-4 border-t border-white/20 flex gap-2">
        <textarea
          id="userInput"
          rows="1"
          placeholder="Type message..."
          class="flex-1 px-4 py-2 rounded-xl bg-white/20 text-white resize-none outline-none"
        ></textarea>
        <button
          class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl"
        >
          Send
        </button>
      </form>
    </div>

    <script>
      function escapeHtml(text) {
        return $("<div>").text(text).html();
      }

      function addMessage(text, sender) {
        const time = new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });

        const htmlContent = marked.parse(text);

        const bubble =
          sender === "user"
            ? `<div class="flex justify-end items-end gap-2">
        <div class="bg-blue-500 text-white px-4 py-2 rounded-2xl max-w-xs">
          ${escapeHtml(text)}
          <div class="text-xs text-right mt-1 opacity-70">${time}</div>
        </div>
        <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="w-8 h-8 rounded-full" />
       </div>`
            : `<div class="flex justify-start items-end gap-2">
        <img src="https://png.pngtree.com/png-vector/20231213/ourmid/pngtree-ai-machine-learning-artificial-intelligence-anthropomorphic-image-4-png-image_11330344.png" class="w-8 h-8 rounded-full" />
        <div class="bg-gray-200 text-gray-900 px-4 py-2 rounded-2xl max-w-xs prose prose-sm">
          ${htmlContent}
          <div class="text-xs mt-1 opacity-70">${time}</div>
        </div>
       </div>`;

        $("#chatBox").append(bubble);
        $("#chatBox").scrollTop($("#chatBox")[0].scrollHeight);
      }

      $("#chatForm").submit(function (e) {
        e.preventDefault();

        const msg = $("#userInput").val().trim();
        if (!msg) return;

        addMessage(msg, "user");
        $("#userInput").val("");

        const loading = `<div id="loading" class="text-gray-300">AI is typing...</div>`;
        $("#chatBox").append(loading);

        $.ajax({
          type: "POST",
          url: "/get",
          data: { msg: msg },
        }).done(function (data) {
          $("#loading").remove();
          addMessage(data, "bot");
        });
      });

      // Enter vs Shift+Enter
      $("#userInput").keydown(function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          $("#chatForm").submit();
        }
      });
    </script>
  </body>
</html>
